<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cataloguei</title>
    <!-- GTM Dinâmico (SPA Aware + Server Side + Preview Support) -->
    <script>
      (function() {
        function loadGTM() {
          const isTargetPage = window.location.href.includes('/trial') || window.location.href.includes('/mofu');
          const isPreview = window.location.href.includes('gtm_debug=');

          if ((isTargetPage || isPreview) && !window.gtmInitialized) {
            window.gtmInitialized = true;
            (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
            new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
            j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
            'https://api.catalogueii.com.br/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
            })(window,document,'script','dataLayer','GTM-P55MPQKF');
          }
        }
        loadGTM();
        window.addEventListener('popstate', loadGTM);
        const originalPushState = history.pushState;
        history.pushState = function() {
          originalPushState.apply(this, arguments);
          loadGTM();
        };
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
